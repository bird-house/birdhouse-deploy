name: "Create Tag"

on:
  push:
    branches:
      - master
    paths:
      - RELEASE.txt

permissions:
  contents: read

jobs:
  tag:
    name: Tag New Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        python-version: [ "3.12" ]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Generate GitHub App token
        id: token_generator
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.BIRDHOUSE_HELPER_BOT_ID }}
          private-key: ${{ secrets.BIRDHOUSE_HELPER_BOT_KEY }}

      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          token: ${{ steps.token_generator.outputs.token }}

      - name: Set up Python${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.BIRDHOUSE_HELPER_BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BIRDHOUSE_HELPER_BOT_GPG_PRIVATE_KEY_PASSWORD }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          trust_level: 5

      - name: Install Python CI Dependencies
        run: |
          python -m pip install --require-hashes -r ./.github/requirements_ci.txt

      - name: Create Tag
        run: |
          CURRENT_VERSION=$(bump-my-version show current_version)
          git tag -s $CURRENT_VERSION -m $CURRENT_VERSION 

      - name: Push Changes
        uses: ad-m/github-push-action@77c5b412c50b723d2a4fbc6d71fb5723bcd439aa # v1.0.0
        with:
          force: false
          tags: true
          github_token: ${{ steps.token_generator.outputs.token }}
