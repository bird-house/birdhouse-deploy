name: Greetings

on:
  pull_request:
    types:
      - opened
  issues:
    types:
      - opened

permissions:
  contents: read

jobs:
  greeting:
    name: First Post Message
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - if: ${{ !endsWith(github.actor, '[bot]') && !endsWith(github.actor, 'bot') }}
      uses: actions/first-interaction@1c4688942c71f71d4f5502a26ea67c331730fa4d # v3.1.0
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        issue_message: >
          Thanks for submitting an issue.

          Please make sure to provide enough details for us to be able to replicate your issue or understand your question.
        pr_message: >
          Thanks for submitting a PR.

          Make sure you have looked at [CONTRIBUTING](https://github.com/bird-house/birdhouse-deploy/blob/master/CONTRIBUTING.rst) guidelines.
